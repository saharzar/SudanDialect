<article class="word-card">
  <h2 class="word-headword">{{ word.headword }}</h2>
  <p class="word-definition">
    @for (part of definitionParts; track $index) {
      @if (part.kind === 'tag') {
        <span
          class="definition-tag"
          [class.tag-primary]="part.colorClass === 'tag-primary'"
          [class.tag-secondary]="part.colorClass === 'tag-secondary'"
          [class.tag-tertiary]="part.colorClass === 'tag-tertiary'"
          tabindex="0"
          [attr.aria-label]="'اختصار ' + part.key + ': ' + part.tooltip"
        >
          {{ part.key }}
          <span class="definition-tooltip" role="tooltip">{{ part.tooltip }}</span>
        </span>
      } @else {
        <span>{{ part.value }}</span>
      }
    }
  </p>

  <div class="word-actions">
    <button class="share-trigger" type="button" (click)="openSharePopup()" title="مشاركة">
      <fa-icon [icon]="shareIcon" class="icon" aria-hidden="true" />
      مشاركة
    </button>
  </div>

  <p class="word-id" dir="ltr">#{{ word.id }}</p>
</article>

@if (isSharePopupOpen) {
  <div class="share-popup-backdrop" (click)="closeSharePopup()">
    <section
      class="share-popup"
      role="dialog"
      aria-modal="true"
      aria-label="مشاركة الكلمة"
      (click)="$event.stopPropagation()"
    >
      <h3 class="share-title">مشاركة الكلمة</h3>
      <p class="share-link" dir="ltr">{{ shareUrl }}</p>

      <div class="share-actions-grid">
        <button class="share-action" type="button" (click)="copyShareLink()" title="نسخ الرابط">
          <fa-icon [icon]="copyIcon" class="icon" aria-hidden="true" />
          نسخ الرابط
        </button>
        <button class="share-action" type="button" (click)="shareOnFacebook()" title="شارك على فيسبوك">
          <fa-icon [icon]="facebookIcon" class="icon" aria-hidden="true" />
          فيسبوك
        </button>
        <button class="share-action" type="button" (click)="shareOnTwitter()" title="شارك على تويتر">
          <fa-icon [icon]="xTwitterIcon" class="icon" aria-hidden="true" />
          تويتر/X
        </button>
        <button class="share-action" type="button" (click)="shareOnWhatsapp()" title="شارك على واتساب">
          <fa-icon [icon]="whatsappIcon" class="icon" aria-hidden="true" />
          واتساب
        </button>
      </div>

      @if (copyFeedback()) {
        <p class="share-feedback">{{ copyFeedback() }}</p>
      }

      <button class="share-close" type="button" (click)="closeSharePopup()">إغلاق</button>
    </section>
  </div>
}
